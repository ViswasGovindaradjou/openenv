name: sla-support-env-v3
version: 3.0
description: Deterministic SLA-aware customer support environment with graded tasks

entrypoint: app:app

actions:
  type: object
  properties:
    type:
      type: string
      enum: [classify, respond, escalate]
    ticket_id:
      type: integer
    value:
      type: string

observations:
  type: object

tasks:
  - easy
  - medium
  - hard